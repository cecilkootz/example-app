server {
    listen 80;
    listen [::]:80;

    server_name www.codomain.com;

    root /var/www/hello;
    index index.html;

    # Basic health check endpoint for load balancers/uptime monitoring
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}